<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whimsical Wardrobe Final</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
        }
        .whimsical-font { 
            font-family: 'Fredoka One', cursive; 
        }
        /* Custom styles for better visual feedback */
        .adjective-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .adjective-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const wardrobeItems = [
            { 
                id: 1, 
                name: "The Clockwork Aviator Hat", 
                imgUrl: "Whimsical Wardrobe - The Clockwork Aviator Hat.png", 
                words: ["Nice", "Cool", "Small", "Old", "Round", "Brown", "English", "Leather", "Flying", "Blue", "New", "Square", "Big", "Bad", "Plastic", "Soft"] 
            },
            { 
                id: 2, 
                name: "The Galaxy Nebula Robe", 
                imgUrl: "Whimsical Wardrobe - The Galaxy Nebula Robe.png", 
                words: ["Pretty", "Good", "Long", "Big", "Purple", "Space", "Silk", "Magic", "Small", "Short", "Green", "Hard", "Cold", "Wood", "New", "Bad"] 
            },
            { 
                id: 3, 
                name: "The Viking Ice Helmet", 
                imgUrl: "Whimsical Wardrobe - The Viking Ice Helmet.png", 
                words: ["Cool", "Strong", "Big", "Old", "Blue", "Nordic", "Ice", "Fighting", "Hot", "Soft", "Pink", "Small", "New", "Paper", "Good", "Sweet"] 
            },
            { 
                id: 4, 
                name: "The Steampunk Boots", 
                imgUrl: "Whimsical Wardrobe - The Steampunk Boots.png", 
                words: ["Tough", "Cool", "Long", "Old", "Dark", "City", "Metal", "Working", "Light", "New", "Short", "Pink", "Soft", "Silk", "Bad", "Small"] 
            },
            { 
                id: 5, 
                name: "The Terrarium Top Hat", 
                imgUrl: "Whimsical Wardrobe - The Terrarium Top Hat.png", 
                words: ["Nice", "Tall", "High", "Green", "Garden", "Glass", "Cloth", "Party", "Short", "Red", "Small", "New", "Metal", "Bad", "Cold", "Hard"] 
            },
            { 
                id: 6, 
                name: "The Phoenix Feather Cape", 
                imgUrl: "Whimsical Wardrobe - The Phoenix Feather Cape.png", 
                words: ["Beautiful", "Good", "Long", "Old", "Red", "Gold", "Feather", "Royal", "Small", "Short", "Blue", "Grey", "Cold", "New", "Bad", "Hard"] 
            },
            { 
                id: 7, 
                name: "The Moss-Covered Ranger Boots", 
                imgUrl: "Whimsical Wardrobe - The Moss-Covered Ranger Boots.png", 
                words: ["Good", "Strong", "Old", "Brown", "Green", "Forest", "Leather", "Walking", "New", "Soft", "Pink", "Small", "Glass", "Bad", "Hot", "Light"] 
            },
            { 
                id: 8, 
                name: "The Alchemist's Lab Coat", 
                imgUrl: "Whimsical Wardrobe - The Alchemist's Lab Coat.png", 
                words: ["Useful", "Busy", "Old", "Heavy", "Green", "School", "Cloth", "Testing", "Clean", "New", "Pink", "Light", "Soft", "Silk", "Small", "Bad"] 
            },
            { 
                id: 9, 
                name: "The Crystal Glass Slipper", 
                imgUrl: "Whimsical Wardrobe - The Crystal Glass Slipper.png", 
                words: ["Nice", "Pretty", "Small", "Sharp", "Clear", "Magic", "Glass", "Dancing", "Big", "Heavy", "Black", "Dirty", "New", "Bad", "Rubber", "Flat"] 
            },
            { 
                id: 10, 
                name: "The Astrolabe Pocket Watch", 
                imgUrl: "Whimsical Wardrobe - The Astrolabe Pocket Watch.png", 
                words: ["Great", "Small", "Old", "Round", "Gold", "Star", "Metal", "Timing", "Big", "New", "Square", "Silver", "Plastic", "Bad", "Blue", "Soft"] 
            }
        ];

        const App = () => {
            const [currentStep, setCurrentStep] = useState(0);
            const [selectedWords, setSelectedWords] = useState([]);

            const currentItem = wardrobeItems[currentStep];

            // Shuffles the words whenever the item changes
            const randomizedWords = useMemo(() => {
                return [...currentItem.words].sort(() => Math.random() - 0.5);
            }, [currentStep]);

            const toggleWord = (word) => {
                setSelectedWords(prev => 
                    prev.includes(word) ? prev.filter(w => w !== word) : [...prev, word]
                );
            };

            const nextItem = () => {
                if (currentStep < wardrobeItems.length - 1) {
                    setCurrentStep(prev => prev + 1);
                    setSelectedWords([]);
                }
            };

            const prevItem = () => {
                if (currentStep > 0) {
                    setCurrentStep(prev => prev - 1);
                    setSelectedWords([]);
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Page Header */}
                    <header className="bg-indigo-600 text-white py-10 px-4 text-center mb-8 shadow-xl">
                        <h1 className="text-4xl md:text-6xl whimsical-font tracking-wide mb-4 drop-shadow-md">
                            {currentItem.name}
                        </h1>
                        <div className="flex items-center justify-center gap-3 font-bold text-indigo-100 uppercase tracking-widest text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4M3 5h4M19 17v4M17 19h4"/></svg>
                            Wardrobe Round {currentStep + 1} of {wardrobeItems.length}
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4">
                        {/* Image Showcase */}
                        <div className="bg-white p-4 rounded-[2.5rem] shadow-2xl mb-12 border-4 border-white overflow-hidden ring-1 ring-slate-200">
                            <img 
                                src={currentItem.imgUrl} 
                                alt={currentItem.name} 
                                className="w-full h-auto max-h-[600px] object-contain rounded-[1.8rem] mx-auto transition-transform duration-700 hover:scale-[1.02]" 
                                onError={(e) => {
                                    e.target.onerror = null;
                                    e.target.src = "https://via.placeholder.com/800x500?text=Please+Place+Images+In+Same+Folder";
                                }}
                            />
                        </div>

                        {/* Word Selection Section */}
                        <section className="mb-12">
                            <div className="text-center mb-8 bg-indigo-50 p-6 rounded-[2rem] border border-indigo-100">
                                <h2 className="text-indigo-400 font-black uppercase tracking-[0.2em] text-xs mb-3">Your Task</h2>
                                <p className="text-slate-700 font-bold text-lg leading-relaxed mb-2">
                                    Choose 4 or 5 adjectives from the word bank below to describe this item.
                                </p>
                                <p className="text-slate-600 font-medium">
                                    Then, arrange them in the correct order to create a perfect noun phrase!
                                </p>
                            </div>
                            
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                {randomizedWords.map(word => {
                                    const isSelected = selectedWords.includes(word);
                                    return (
                                        <button 
                                            key={word} 
                                            onClick={() => toggleWord(word)} 
                                            className={`adjective-btn px-4 py-5 rounded-2xl text-xl font-bold border-2 transition-all shadow-sm ${
                                                isSelected 
                                                ? 'bg-indigo-600 text-white border-indigo-600 -translate-y-1 shadow-lg' 
                                                : 'bg-white text-slate-500 border-slate-100 hover:border-indigo-300 hover:bg-indigo-50'
                                            }`}
                                        >
                                            {word}
                                        </button>
                                    );
                                })}
                            </div>
                        </section>

                        {/* Navigation Footer */}
                        <div className="flex justify-between items-center bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200 mb-10">
                            <button 
                                onClick={prevItem} 
                                disabled={currentStep === 0} 
                                className="flex items-center gap-2 px-8 py-4 rounded-2xl font-black uppercase tracking-widest text-sm transition-all hover:bg-slate-100 disabled:opacity-10 text-indigo-600"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                                Previous
                            </button>
                            
                            <div className="px-6 py-2 bg-slate-100 rounded-full text-slate-500 font-black text-xs tracking-widest">
                                {currentStep + 1} / {wardrobeItems.length}
                            </div>

                            <button 
                                onClick={nextItem} 
                                disabled={currentStep === wardrobeItems.length - 1} 
                                className="flex items-center gap-2 px-8 py-4 rounded-2xl font-black uppercase tracking-widest text-sm transition-all hover:bg-slate-100 disabled:opacity-10 text-indigo-600"
                            >
                                Next
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                            </button>
                        </div>
                        
                        {/* Submission Tip */}
                        <div className="p-8 bg-emerald-50 rounded-[2.5rem] border-2 border-dashed border-emerald-200 text-center animate-pulse">
                            <p className="text-emerald-800 font-black uppercase tracking-widest text-sm mb-2">Instructions</p>
                            <p className="text-emerald-700 font-medium">
                                Plan your sentence here, then use the <strong>Google Form</strong> to submit your answer!
                            </p>
                        </div>
                    </main>

                    <footer className="mt-20 pb-10 text-center text-slate-300 text-[10px] font-black uppercase tracking-[0.3em]">
                        Whimsical Wardrobe • Adjective Order Exploration Activity
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
