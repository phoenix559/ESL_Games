<head>
    <!-- This is what appears on the tab -->
    <title>Past-Tense Pressure</title>
</head>

<body>
    <header>
        <!-- Top Quadrant (game title) -->
        <h1>Past-Tense Pressure: Smart Edition</h1>
        
        <!-- API Key entry-->
        <input type="password">
        <button> Save API Key </button>
    
        <!-- Student Answer Entry and Checker -->
        <input type="text">
        <button> Check Answer </button>
    </header>
    
    <div>
        <!-- Status Bar with current team playing and timer -->
        <h2>Turn: Team #</h2>
        <h2>3:00</h2>
    </div>
    
    <div>
        <!-- gameboard -->
    </div>
    <footer>
        <!-- Scoreboard -->
        <button>Add Team</button>
        <button>Remove Team</button>
        <h2>Team 1</h2>
    </footer>

</body>
