<head>

    <!-- This is what appears on the tab -->

    <title>Past-Tense Pressure</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>

    <header class =  "bg-blue-800">

        <!-- Top Quadrant (game title) -->

        <h1 class="text-blue-200 font-bold">Past-Tense Pressure: Smart Edition</h1>

       

        <!-- API Key entry-->

        <input class="text-blue-200" type="password">

        <button class="text-blue-200"> Save API Key </button>

   

        <!-- Student Answer Entry and Checker -->

        <input class="text-blue-200" type="text">

        <button class="text-blue-200"> Check Answer </button>

    </header>

   

    <div class = "bg-sky-200">

        <!-- Status Bar with current team playing and timer -->

        <h2 class="text-red-200 font-bold bg-red-800">Turn: Team #</h2>

        <h2 class="text-green-200 font-bold bg-gray-800">3:00</h2>

    </div>

   

    <div class="bg-emerald-500">

        <!-- gameboard -->

         <p class = "text-red-500 font-bold shadow-red-950">Gameboard goes here</p>

    </div>

    <footer class="bg-mist-300">

        <!-- Scoreboard -->

        <button>Add Team</button>

        <button>Remove Team</button>

        <h2 class="text-red-800">Team 1</h2>

        <p class="text-red-800">0</p>

        <h2 class="text-blue-800">Team 2</h2>

        <p class="text-blue-800">0</p>

    </footer>



</body>
